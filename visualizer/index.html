<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toulmin Arguments</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ════════ Phase 1: Full-screen Dashboard ════════ -->
<div id="phase-1">
  <div id="phase1-bg" aria-hidden="true"></div>
  <div id="phase1-inner">
    <div id="phase1-label">Toulmin Argument Map</div>

    <div id="phase1-hero">
      <div id="phase1-total-num" class="phase1-big-num">0</div>
      <div id="phase1-total-label">ARGUMENTS</div>
    </div>

    <div id="phase1-stats">
      <div class="phase1-stat">
        <div class="phase1-stat-num" id="phase1-verified">0</div>
        <div class="phase1-stat-label">VERIFIED<br>GROUNDS</div>
      </div>
      <div class="phase1-stat-divider"></div>
      <div class="phase1-stat">
        <div class="phase1-stat-num" id="phase1-supported">0</div>
        <div class="phase1-stat-label">SUPPORTED<br>CLAIMS</div>
      </div>
      <div class="phase1-stat-divider"></div>
      <div class="phase1-stat">
        <div class="phase1-stat-num" id="phase1-pending">0</div>
        <div class="phase1-stat-label">PENDING<br>VERIFICATION</div>
      </div>
    </div>

    <div id="phase1-meta">
      <span id="live-dot"></span>
      <span id="live-text">连接中…</span>
      <span class="phase1-sep">·</span>
      <span id="db-current-path" class="phase1-db">加载中…</span>
    </div>

    <div id="phase1-attention"></div>

    <button id="phase1-enter">
      <span class="phase1-enter-arrow">↑</span>
      查看图谱
    </button>
  </div>
</div>

<!-- ════════ Phase 2: Graph view ════════ -->
<div id="phase-2">

  <!-- ── Floating Command Window ── -->
  <div id="command-window">
    <div id="cw-rest">
      <div id="cw-filters">
        <button class="type-toggle active" data-type="claim"   title="Claim">C</button>
        <button class="type-toggle active" data-type="ground"  title="Ground">G</button>
        <button class="type-toggle active" data-type="warrant" title="Warrant">W</button>
        <button class="type-toggle active" data-type="backing" title="Backing">B</button>
        <button class="type-toggle active" data-type="rebuttal" title="Rebuttal">R</button>
      </div>
      <div id="cw-search-hint">
        <span class="cw-search-icon">⌕</span>
        <span class="cw-hint-text">Search arguments…</span>
        <span class="cw-kbd">⌘K</span>
      </div>
    </div>

    <div id="cw-expanded">
      <div id="cw-search-row">
        <span class="cw-search-icon-big">⌕</span>
        <input id="cw-search-input" type="text" placeholder="Search nodes…" autocomplete="off">
        <button id="cw-close-btn">Esc</button>
      </div>

      <div id="cw-sections">
        <div class="cw-section">
          <div class="cw-section-label">节点过滤</div>
          <div class="cw-filter-pills">
            <label class="cw-pill active" data-type="claim">
              <span class="cw-pill-icon">C</span>
              <span class="cw-pill-name">Claim</span>
              <span class="cw-pill-count" id="count-claim">0</span>
            </label>
            <label class="cw-pill active" data-type="ground">
              <span class="cw-pill-icon">G</span>
              <span class="cw-pill-name">Ground</span>
              <span class="cw-pill-count" id="count-ground">0</span>
            </label>
            <label class="cw-pill active" data-type="warrant">
              <span class="cw-pill-icon">W</span>
              <span class="cw-pill-name">Warrant</span>
              <span class="cw-pill-count" id="count-warrant">0</span>
            </label>
            <label class="cw-pill active" data-type="backing">
              <span class="cw-pill-icon">B</span>
              <span class="cw-pill-name">Backing</span>
              <span class="cw-pill-count" id="count-backing">0</span>
            </label>
            <label class="cw-pill active" data-type="rebuttal">
              <span class="cw-pill-icon">R</span>
              <span class="cw-pill-name">Rebuttal</span>
              <span class="cw-pill-count" id="count-rebuttal">0</span>
            </label>
          </div>
        </div>

        <div class="cw-section">
          <div class="cw-section-label">证据验证</div>
          <div class="cw-progress-item">
            <div class="cw-progress-header">
              <span>Grounds</span>
              <span id="ground-progress-label" class="cw-progress-count">0/0</span>
            </div>
            <div class="cw-progress-track">
              <div class="cw-progress-fill" id="ground-progress-bar" style="width:0%"></div>
            </div>
          </div>
          <div class="cw-progress-item">
            <div class="cw-progress-header">
              <span>Claims</span>
              <span id="claim-progress-label" class="cw-progress-count">0/0</span>
            </div>
            <div class="cw-progress-track">
              <div class="cw-progress-fill" id="claim-progress-bar" style="width:0%"></div>
            </div>
          </div>
        </div>

        <div class="cw-section">
          <div class="cw-section-label">数据库</div>
          <div class="cw-db">
            <div class="cw-db-path">当前：<span id="db-current-path-2" class="cw-db-val">—</span></div>
            <div class="cw-db-row">
              <input type="text" id="db-path-input" placeholder="输入 .toulmin 目录绝对路径">
              <button id="db-switch-btn">切换</button>
            </div>
            <div id="db-status" class="db-status"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Full-bleed Canvas ── -->
  <div id="cy-container">
    <div id="toolbar">
      <button onclick="refreshGraph()">⟳</button>
      <button onclick="fitGraph()">◎</button>
      <button onclick="centerGraph()">⊕</button>
      <button id="toolbar-back" onclick="returnToPhase1()" title="返回大盘">↓</button>
      <div class="toolbar-sep"></div>
      <button id="mode-box" class="mode-btn active" onclick="setSelectionMode('box')" title="框选模式 (拖动画框选中节点)">⬚</button>
      <button id="mode-pan" class="mode-btn" onclick="setSelectionMode('pan')" title="拖动模式 (拖动平移画布)">✥</button>
    </div>
    <div id="cy"></div>
    <div id="empty-state" style="display:none">
      <p style="font-size:40px;margin-bottom:12px;opacity:0.3">◈</p>
      <p>暂无论证数据</p>
      <p style="font-size:12px;margin-top:6px">使用 MCP 工具创建节点后刷新</p>
    </div>
  </div>

  <!-- ── Bottom Sheet ── -->
  <div id="bottom-sheet">
    <div id="bs-handle"></div>
    <div id="bs-content"></div>
  </div>

  <!-- ── Status Bar ── -->
  <div id="statusbar">
    <div id="sb-left">
      <span id="sb-live-dot" class="sb-dot"></span>
      <span id="sb-live-text">—</span>
      <span class="sb-sep">·</span>
      <span id="stat-total">0</span> nodes
    </div>
    <div id="sb-right">
      <span id="selection-count" style="display:none; color:#4FDFFF; font-size:11px; font-weight:600; letter-spacing:0.04em;"></span>
    </div>
  </div>
</div>

<!-- ════════ Hidden legacy panel (DOM constraint: data.js queries these) ════════ -->
<div id="filter-panel" aria-hidden="true">
  <input type="checkbox" data-type="claim" checked>
  <input type="checkbox" data-type="ground" checked>
  <input type="checkbox" data-type="warrant" checked>
  <input type="checkbox" data-type="backing" checked>
  <input type="checkbox" data-type="rebuttal" checked>
  <input type="radio" name="layout" value="tree" checked>
  <input type="radio" name="layout" value="force">
  <input type="text" id="search-input">
</div>

<!-- ════════ Floating Tooltip ════════ -->
<div id="tooltip">
  <div class="tt-type" id="tt-type"></div>
  <div class="tt-content" id="tt-content"></div>
  <div class="tt-meta" id="tt-meta"></div>
</div>

<!-- ════════ Scripts (load order matters) ════════ -->
<script src="js/bg.js"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/tooltip.js"></script>
<script src="js/graph-init.js"></script>
<script src="js/forest.js"></script>
<script src="js/renderer.js"></script>
<script src="js/data.js"></script>
<script src="js/selection.js"></script>
<script src="js/bottomsheet.js"></script>
<script src="js/detail.js"></script>
<script src="js/db.js"></script>
<script src="js/phase.js"></script>
<script src="js/app.js"></script>

</body>
</html>
